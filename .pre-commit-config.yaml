# .pre-commit-config.yaml — xCloudVLMui Platform Pre-commit Hooks
# 安裝：pip install pre-commit && pre-commit install
# 手動執行：pre-commit run --all-files
# 更新 hooks：pre-commit autoupdate

repos:
  # ── 通用檢查 ─────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        name: 移除行尾空白
      - id: end-of-file-fixer
        name: 確保檔案以換行結尾
      - id: check-yaml
        name: 驗證 YAML 格式
      - id: check-toml
        name: 驗證 TOML 格式
      - id: check-json
        name: 驗證 JSON 格式
        exclude: "^frontend/"   # Next.js tsconfig.json 有 comment，由 eslint 處理
      - id: check-merge-conflict
        name: 檢查合併衝突標記
      - id: check-added-large-files
        name: 阻止提交大型檔案（> 5MB）
        args: ["--maxkb=5120"]
      - id: detect-private-key
        name: 偵測私鑰洩漏
      - id: no-commit-to-branch
        name: 阻止直接提交至保護分支
        args: ["--branch", "main", "--branch", "master"]
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # ── Secret 偵測 ───────────────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: 偵測機密洩漏（HF_TOKEN / API_KEY / SECRET）
        args: ["--baseline", ".secrets.baseline"]
        exclude: "(package-lock\\.json|CHANGELOG\\.md|\\.env\\.example)"

  # ── Python：Ruff（Linter + Formatter-compatible check）────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        name: Ruff lint（E/W/F/I/B/C4/UP/N/S/T20/PT/RUF）
        args: ["--fix", "--exit-non-zero-on-fix"]
        files: "^backend/"
        types: [python]
      - id: ruff-format
        name: Ruff format（Black 相容）
        files: "^backend/"
        types: [python]

  # ── Python：Black（最終格式化保障）───────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        name: Black 格式化
        files: "^backend/"
        language_version: python3.11
        args: ["--line-length=100"]

  # ── Python：mypy 型別檢查 ─────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        name: mypy 靜態型別檢查
        files: "^backend/"
        language_version: python3.11
        args:
          - "--ignore-missing-imports"
          - "--no-error-summary"
          - "--config-file=backend/pyproject.toml"
        additional_dependencies:
          - "sqlalchemy[mypy]>=2.0"
          - "pydantic>=2.0"
          - "fastapi>=0.111"

  # ── Frontend：ESLint ──────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: eslint
        name: ESLint（Next.js / TypeScript）
        language: node
        entry: bash -c "cd frontend && npx eslint --ext .ts,.tsx src/ --max-warnings 0"
        files: "^frontend/src/.*\\.(ts|tsx)$"
        pass_filenames: false

  # ── Frontend：Prettier（TypeScript/CSS/JSON）──────────────────────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        name: Prettier 格式化（TS/CSS/JSON）
        files: "^frontend/src/.*\\.(ts|tsx|css|json)$"
        additional_dependencies:
          - "prettier@3.3.2"
          - "prettier-plugin-tailwindcss@0.6.5"

  # ── Markdown Lint ─────────────────────────────────────────────────────
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.41.0
    hooks:
      - id: markdownlint
        name: Markdown 格式檢查
        args: ["--disable", "MD013", "MD033", "MD041", "--"]
        exclude: "^(CHANGELOG\\.md|docs/adr/)"  # Changelog 與 ADR 格式較寬鬆

# ── CI 整合設定 ───────────────────────────────────────────────────────
ci:
  autofix_commit_msg: "style: auto-fix by pre-commit hooks [skip ci]"
  autofix_prs: true
  autoupdate_branch: ""
  autoupdate_commit_msg: "chore: pre-commit autoupdate [skip ci]"
  autoupdate_schedule: monthly
  skip: []
  submodules: false
