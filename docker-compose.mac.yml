###############################################################################
# docker-compose.mac.yml — xCloudVLMui Platform [bot-mac 獨立實例]
#
# ⚠️  此為 bot-mac 完全獨立部署，與其他實例完全隔離：
#     - project name : xcloudvlmui-mac
#     - container 前綴: mac-
#     - volume 前綴  : mac-
#     - network      : mac-xcloud-net
#
# Port 配置（不與 bot-air030 衝突）：
#   nginx    → 3110:80   ← 主要入口 (bot-air030 使用 8880)
#   backend  → 8201:8000 (bot-air030 使用 8001)
#   frontend → 3200:3000 (bot-air030 使用 3100)
#   llama-cpp→ 18280:8080(bot-air030 使用 18080)
#   vlm-webui→ 8290:8090 (bot-air030 使用 8090)
#   cadvisor → 8291:8080 (bot-air030 使用 8091)
#   mosquitto→ 內網 (不對外, 由 nginx 代理)
#
# 快速啟動：
#   docker compose -f docker-compose.mac.yml up -d
###############################################################################

name: xcloudvlmui-mac

x-llm-env: &llm-env
  LLM_BASE_URL:    http://host.docker.internal:11434   # 宿主機 Ollama
  LLM_MODEL:       gemma4:e4b
  LLM_CTX_SIZE:    "131072"
  LLM_MAX_TOKENS:  "4096"
  LLM_TEMPERATURE: "0.1"
  EMBED_MODEL:     nomic-embed-text                    # 專用 embedding 模型

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:

  # ── [1] model-init: macOS 跳過下載 ─────────────────────────────────
  model-init:
    image: busybox:latest
    container_name: mac-model-init
    command: ["sh", "-c", "echo '[mac] skip model download' && exit 0"]
    restart: "no"
    networks:
      - mac-xcloud-net

  # ── [2] mosquitto ──────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mac-mqtt
    restart: unless-stopped
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mac-mosquitto-data:/mosquitto/data
      - mac-mosquitto-log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -p 1883 -t 'health/ping' -m 'ping' -q 0 2>/dev/null && echo ok || exit 1"]
      interval: 15s
      timeout:  5s
      retries:  3
      start_period: 10s
    networks:
      - mac-xcloud-net
    logging: *default-logging

  # ── [3] llama-cpp stub (whoami placeholder) ─────────────────────────
  llama-cpp:
    image: traefik/whoami:latest
    container_name: mac-llama-cpp
    restart: unless-stopped
    command: ["--port=8080"]
    ports:
      - "18280:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080"]
      interval: 5s
      timeout:  3s
      retries:  5
      start_period: 5s
    networks:
      - mac-xcloud-net
    logging: *default-logging

  # ── [4] vlm-webui stub (whoami placeholder) ─────────────────────────
  vlm-webui:
    image: traefik/whoami:latest
    container_name: mac-vlm-webui
    restart: unless-stopped
    command: ["--port=8090"]
    ports:
      - "8290:8090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090"]
      interval: 5s
      timeout:  3s
      retries:  5
      start_period: 5s
    networks:
      - mac-xcloud-net
    logging: *default-logging

  # ── [5] backend ────────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    image: xcloudvlmui-mac-backend:latest
    container_name: mac-backend
    restart: unless-stopped
    environment:
      <<: *llm-env
      APP_NAME:           "xCloudVLMui Platform [bot-mac]"
      VLM_WEBUI_URL:      http://vlm-webui:8090   # service name
      DATABASE_URL:       sqlite+aiosqlite:////data/xcloudvlm.db
      CHROMA_PERSIST_DIR: /data/chroma
      ALLOWED_ORIGINS:    '["http://localhost:3200","http://localhost:3110","http://localhost"]'
      DEBUG:              "false"
      MQTT_BROKER_HOST:   mosquitto             # service name
      MQTT_BROKER_PORT:   "1883"
      MQTT_ENABLED:       "true"
    env_file:
      - path: ./backend/.env
        required: false
    volumes:
      - mac-backend-data:/data
      - ./backend/uploads:/app/uploads
    ports:
      - "8201:8000"
    depends_on:
      llama-cpp:
        condition: service_started
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 20s
      timeout:  10s
      retries:  5
      start_period: 30s
    networks:
      - mac-xcloud-net
    logging: *default-logging

  # ── [6] frontend ───────────────────────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    image: xcloudvlmui-mac-frontend:latest
    container_name: mac-frontend
    restart: unless-stopped
    environment:
      - NEXTAUTH_URL=http://localhost:3110
      - NEXT_PUBLIC_API_URL=http://localhost:3110    # 瀏覽器透過 Nginx (port 3110) 存取
      # NEXT_PUBLIC_WS_URL 留空 → 由 camera-stream.tsx 從 window.location 自動推導
      # 若直連後端開發（無 Nginx），設為：ws://localhost:8201
      - NEXT_PUBLIC_WS_URL=
      - NODE_ENV=production
    env_file:
      - path: ./frontend/.env.local
        required: false
    ports:
      - "3200:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 20s
      timeout:  10s
      retries:  5
      start_period: 15s
    networks:
      - mac-xcloud-net
    logging: *default-logging

  # ── [7] nginx ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: mac-nginx
    restart: unless-stopped
    ports:
      - "3110:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/health"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 15s
    networks:
      - mac-xcloud-net
    logging: *default-logging

  # ── [8] cadvisor ───────────────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: mac-cadvisor
    restart: unless-stopped
    privileged: true
    ports:
      - "8291:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    command:
      - "--housekeeping_interval=15s"
      - "--max_housekeeping_interval=20s"
      - "--event_storage_event_limit=default=0"
      - "--event_storage_age_limit=default=0"
      - "--disable_metrics=advtcp,cpuset,hugetlb,memory_numa,process,referenced_memory,resctrl,sched,tcp,udp"
      - "--store_container_labels=false"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 10s
    networks:
      - mac-xcloud-net
    logging: *default-logging

# ── Named Volumes（獨立於 bot-air030）──────────────────────────────────
volumes:
  mac-backend-data:
    driver: local
  mac-mosquitto-data:
    driver: local
  mac-mosquitto-log:
    driver: local

# ── Network（獨立隔離）─────────────────────────────────────────────────
networks:
  mac-xcloud-net:
    name: mac-xcloud-net
    driver: bridge
