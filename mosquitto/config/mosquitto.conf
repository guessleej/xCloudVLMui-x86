# ── Mosquitto MQTT Broker 設定 ────────────────────────────────────────
# xCloud VLM IoT Edge Suite

listener 1883
protocol mqtt

listener 9001
protocol websockets

allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

max_connections 512
max_packet_size 1048576
